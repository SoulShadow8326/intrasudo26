{{define "landing"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Intra Sudo 2026" />
    <title>{{.Title}}</title>
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Permanent+Marker&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/components/css/main.css" />
  </head>
  <body class="page page-landing pixel">
    {{template "header" .}} {{template "confetti" .}}

    <main class="page-main">
      <div class="container section-stack">
        <section class="landing-hero">
          <div class="landing-hero-copy">
            <h1 class="display">
              Intra Sudo <span class="brand-accent">v7.0</span>
            </h1>
            <p class="body-lg">intro here</p>
          </div>
          <p class="body-sm landing-hero-support">text here</p>
          <div class="actions actions-center">
            <a href="/play" class="button">Press to Play</a>
          </div>
        </section>

        {{if .CountdownLive}} {{template "countdown" .}} {{end}}
      </div>
    </main>

    {{template "footer" .}}
    <script src="/components/js/app.js"></script>
    <script src="/components/js/confetti.js"></script>
  </body>
</html>
{{end}}
