{{define "play"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Permanent+Marker&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css"
    />
    <link rel="stylesheet" href="/components/css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  </head>
  {{.SrcHint}}
  <body class="page page-play pixel">
    {{template "header" .}} {{template "confetti" .}}
    <main class="page-main">
      {{template "annoucements" .}}
      <div class="container play-layout">
        <section class="panel play-panel challenge-center">
          <article class="challenge-frame">
            <div class="challenge-center">
              <h1 class="heading-xl">
                Level {{if
                .LevelDisplay}}{{.LevelDisplay}}{{else}}{{.Level.ID}}{{end}}
              </h1>
            </div>
            <div id="level-markup" class="challenge-center prose level-markup" data-markup="{{.Level.Markup}}">
              {{.Level.Markup}}
            </div>
          </article>

          <form id="submit-form" class="submission-row submission-center">
            <div class="send-row">
              <input
                id="answer-input"
                name="answer"
                autocomplete="off"
                class="field mono pixel-input"
                placeholder="Enter your answer"
              />
              <button type="submit" class="send-button" aria-label="send">
                <img src="assets/send.png" />
              </button>
            </div>
          </form>
          <p id="play-message" class="form-message"></p>
        </section>
      </div>

      {{template "chat" .}}
    </main>
    {{template "footer" .}}
    <script id="__LEVEL__" type="application/json">
      {{toJSON .Level}}
    </script>
    <script id="__MESSAGES__" type="application/json">
      {{toJSON .Messages}}
    </script>
    <script id="__HINTS__" type="application/json">
      {{toJSON .Hints}}
    </script>
    <script>
      window.__LEVEL__ = JSON.parse(
        document.getElementById("__LEVEL__").textContent || "null",
      );
      window.__MESSAGES__ = JSON.parse(
        document.getElementById("__MESSAGES__").textContent || "null",
      );
      window.__HINTS__ = JSON.parse(
        document.getElementById("__HINTS__").textContent || "null",
      );
    </script>
    <script src="/components/js/app.js"></script>
    <script src="/components/js/confetti.js"></script>
    <script src="/components/js/chat.js"></script>
    <script src="/components/js/play.js"></script>
  </body>
</html>
{{end}}
