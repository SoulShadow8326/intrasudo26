{{define "not-found"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="https://unpkg.com/@hackernoon/pixel-icon-library/fonts/iconfont.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Permanent+Marker&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/components/css/main.css" />
  </head>
  <body class="page page-not-found pixel">
    {{template "header" .}}
    <main class="page-main">
      <div class="container redirect-layout">
        <section class="empty-panel">
          <p class="eyebrow">404</p>
          <h1 class="heading-xl">Page not found</h1>
          <p class="empty-state">That route does not exist in the app yet.</p>
          <div class="actions actions-center">
            <a href="/" class="button">Return Home</a>
          </div>
        </section>
      </div>
    </main>
    {{template "footer" .}}
    <script src="/components/js/app.js"></script>
  </body>
</html>
{{end}}
