{{define "leaderboard"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@hackernoon/pixel-icon-library/fonts/iconfont.css"
    />
    <link rel="stylesheet" href="/components/css/main.css" />
  </head>
  <body class="page page-leaderboard pixel">
    {{template "header" .}}
    <main class="page-main" style="min-height: 74vh">
      <div class="container">
        <section class="panel leaderboard-panel">

          <div class="leaderboard-head">
            <div>Rank</div>
            <div>Name</div>
            <div style="justify-self: center">Level</div>
          </div>

          <div class="leaderboard-list" id="leaderboard-list">
            <!-- Populated by JS -->
            <div id="leaderboard-loading" class="empty-state">Loading...</div>
          </div>
          <div id="leaderboard-more-container" style="text-align: center; margin-top: 20px;">
            <button id="leaderboard-more-btn" class="button button--primary" style="display: none;">Load More</button>
          </div>
        </section>
      </div>
    </main>
    {{template "footer" .}}
    <script src="/components/js/app.js"></script>
    <script src="/components/js/leaderboard.js"></script>
  </body>
</html>
{{end}}
