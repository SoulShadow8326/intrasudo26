{{define "timegate"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="icon" href="/assets/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@hackernoon/pixel-icon-library/fonts/iconfont.css"
    />
    <link rel="stylesheet" href="/components/css/main.css" />
  </head>

  <body class="page page-landing pixel">
    {{template "header" .}}

    <main class="page-main" style="min-height: 74vh">
      <div class="container section-stack">
        <section class="landing-hero">
          {{if .CountdownLive}} {{template "countdown" .}} {{end}}
          <div class="actions actions-center">
            <a href="/" class="button">Back to landing</a>
          </div>
        </section>
      </div>
    </main>

    {{template "footer" .}}
    <script src="/components/js/app.js"></script>
    <script src="/components/js/confetti.js"></script>
  </body>
</html>
{{end}}
