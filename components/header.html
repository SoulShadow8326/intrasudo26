{{define "header"}}
<header class="site-header">
  <div class="container site-header-inner">
    <a href="/" class="brand">
      <img src="/assets/logo.png" alt="Intra Sudo" class="brand-mark">
      <span class="brand-title">Intra Sudo <span style="color: var(--brand)">v7.0</span></span>

    </a>
    <nav class="site-nav">
      <a class="{{if eq .RequestPath "/"}}nav-item--active{{else}}nav-item{{end}}" href="/"><i class="hn hn-home" aria-hidden="true"></i>Home</a>

      {{if .LoggedIn}}<a class="{{if eq .RequestPath "/play"}}nav-item--active{{else}}nav-item{{end}}" href="/play"><i class="hn hn-play" aria-hidden="true"></i>Play</a>{{end}}
      <a class="{{if eq .RequestPath "/leaderboard"}}nav-item--active{{else}}nav-item{{end}}" href="/leaderboard"><i class="hn hn-numbered-list" aria-hidden="true"></i>Leaderboard</a>
      {{if .IsAdmin}}<a class="{{if eq .RequestPath "/admin"}}nav-item--active{{else}}nav-item{{end}}" href="/admin"><i class="hn hn-dollar" aria-hidden="true"></i>Admin</a>{{end}}
      <a class="button button--auth" href="{{.StatusURL}}">{{.StatusLabel}}<i class="hn hn-user"></i></a>
    </nav>
    <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <i class="hn hn-bars hamburger-img"></i>
    </button>
    <div id="nav-backdrop" class="nav-backdrop" aria-hidden="true"></div>
  </div>
</header>
{{end}}
