{{define "header"}}
{{template "transition" .}}
<header class="site-header">
  <div class="container site-header-inner">
    <a href="/" class="brand">
      <img src="/assets/logo.png" alt="Intra Sudo" class="brand-mark">
      <span class="brand-title">Intra Sudo <span style="color: var(--brand)">v7.0</span></span>

    </a>
    <nav class="site-nav">
      <a class="{{if eq .RequestPath "/"}}nav-item--active{{else}}nav-item{{end}}" href="/"><i class="hn hn-home" aria-hidden="true"></i><span class="nav-label">Home</span></a>

      {{if .LoggedIn}}<a class="{{if eq .RequestPath "/play"}}nav-item--active{{else}}nav-item{{end}}" href="/play"><i class="hn hn-play" aria-hidden="true"></i><span class="nav-label">Play</span></a>{{end}}
      <a class="{{if eq .RequestPath "/leaderboard"}}nav-item--active{{else}}nav-item{{end}}" href="/leaderboard"><i class="hn hn-numbered-list" aria-hidden="true"></i><span class="nav-label">Leaderboard</span></a>
      {{if .IsAdmin}}<a class="{{if eq .RequestPath "/admin"}}nav-item--active{{else}}nav-item{{end}}" href="/admin"><span class="nav-label">Admin</span></a>{{end}}
      <a class="button button--auth" href="{{.StatusURL}}"><span class="nav-label">{{.StatusLabel}}</span><i class="hn hn-user" aria-hidden="true"></i></a>
    </nav>
    <a href="{{.StatusURL}}" class="mobile-top-auth button button--auth" aria-label="{{.StatusLabel}}">{{.StatusLabel}}</a>

    <nav class="mobile-footer" aria-hidden="true">
      <a href="/" class="mobile-item" aria-label="Home">
        <i class="hn hn-home" aria-hidden="true"></i>
      </a>
      <a href="/play" class="mobile-item" aria-label="Play">
        <i class="hn hn-play" aria-hidden="true"></i>
      </a>
      <a href="/leaderboard" class="mobile-item" aria-label="Leaderboard">
        <i class="hn hn-numbered-list" aria-hidden="true"></i>
      </a>
    </nav>
  </div>
</header>
{{end}}
