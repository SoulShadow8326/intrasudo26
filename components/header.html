{{define "header"}}
<header class="site-header">
  <div class="container site-header-inner">
    <a href="/" class="brand">
      <img src="/assets/logo.png" alt="Intra Sudo" class="brand-mark">
      <span class="brand-title">Intra Sudo <span style="color: var(--brand)">v7.0</span></span>

    </a>
    <nav class="site-nav">
      <a class="{{if eq .RequestPath "/"}}nav-item--active{{else}}nav-item{{end}}" href="/">Home</a>

      {{if .LoggedIn}}<a class="{{if eq .RequestPath "/play"}}nav-item--active{{else}}nav-item{{end}}" href="/play">Play</a>{{end}}
      <a class="{{if eq .RequestPath "/leaderboard"}}nav-item--active{{else}}nav-item{{end}}" href="/leaderboard">Leaderboard</a>
      {{if .IsAdmin}}<a class="{{if eq .RequestPath "/admin"}}nav-item--active{{else}}nav-item{{end}}" href="/admin">Admin</a>{{end}}
      <a class="button button--auth" href="{{.StatusURL}}">{{.StatusLabel}}</a>
    </nav>
    <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <img src="/assets/hamburger.png" class="hamburger-img" alt="Menu">
    </button>
  </div>
</header>
{{end}}
