{{define "leaderboard"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="/assets/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@hackernoon/pixel-icon-library/fonts/iconfont.css"
    />
    <link rel="stylesheet" href="/components/css/main.css" />
  </head>
  <body class="page page-leaderboard pixel">
    {{template "header" .}}
    <main class="page-main" style="min-height: 74vh">
      <div class="container">
        <section class="panel leaderboard-panel">

          <div class="leaderboard-head">
            <div>Rank</div>
            <div>Name</div>
            <div style="justify-self: center">Level</div>
          </div>

          <div class="leaderboard-list" id="leaderboard-list">
            <div id="leaderboard-loading" class="leaderboard-loading-container">
              {{range .Leaderboard}}
              {{else}}
                <div class="leaderboard-row is-loading">
                  <div class="leaderboard-rank"><div class="skeleton skeleton-text" style="width: 30px;"></div></div>
                  <div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text short"></div>
                  </div>
                  <div class="leaderboard-score"><div class="skeleton skeleton-text" style="width: 40px; margin: 0 auto;"></div></div>
                </div>
                <div class="leaderboard-row is-loading">
                  <div class="leaderboard-rank"><div class="skeleton skeleton-text" style="width: 30px;"></div></div>
                  <div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text short"></div>
                  </div>
                  <div class="leaderboard-score"><div class="skeleton skeleton-text" style="width: 40px; margin: 0 auto;"></div></div>
                </div>
                <div class="leaderboard-row is-loading">
                  <div class="leaderboard-rank"><div class="skeleton skeleton-text" style="width: 30px;"></div></div>
                  <div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text short"></div>
                  </div>
                  <div class="leaderboard-score"><div class="skeleton skeleton-text" style="width: 40px; margin: 0 auto;"></div></div>
                </div>
              {{end}}
            </div>
          </div>
          <div id="leaderboard-more-container" style="text-align: center; margin-top: 20px;">
            <button id="leaderboard-more-btn" class="button button--primary" style="display: none;">Load More</button>
          </div>
        </section>
      </div>
      <div id="my-rank-bar" class="my-rank-bar hidden">
        <div class="container">
          <div class="my-rank-content">
            <div id="my-rank-row" class="leaderboard-row my-rank-row">
            </div>
          </div>
        </div>
      </div>
    </main>
    {{template "footer" .}}
    <script src="/components/js/app.js"></script>
    <script src="/components/js/leaderboard.js"></script>
  </body>
</html>
{{end}}
